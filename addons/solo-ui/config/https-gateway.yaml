apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: solo-enterprise-ui-https
  namespace: agentgateway-system
spec:
  gatewayClassName: enterprise-agentgateway
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: example.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: solo-ui-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All

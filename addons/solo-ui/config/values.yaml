# -- Cluster name
cluster: 'default'

# -- Enable AgentGateway
products:
  agentgateway:
    enabled: true

# -- ClickHouse storage
clickhouse:
  persistentVolume:
    enabled: true
    storageClass: null
    size: 10Gi

# -- RBAC role mapping
rbac:
  roleMapping:
    roleMapper: 'has(claims.Groups) ? claims.Groups.transformList(i, v, v in rolesMap, rolesMap[v]) : []'

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: solo-enterprise-ui
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: solo-enterprise-ui-https
      namespace: agentgateway-system
  hostnames:
    - example.com
  rules:
    - backendRefs:
        - name: solo-enterprise-ui
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /

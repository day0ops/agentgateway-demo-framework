# Example ClusterIssuer for Let's Encrypt using Gateway API HTTP-01 solver
# This is a reference example - create your own ClusterIssuer based on your needs
# Reference: https://cert-manager.io/docs/configuration/acme/http01/#configuring-the-http-01-gateway-api-solver

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email address for ACME account
    email: your-email@example.com
    # Secret to store ACME account private key
    privateKeySecretRef:
      name: letsencrypt-prod
    # HTTP-01 challenge provider using Gateway API
    # Requires cert-manager to be installed with --enable-gateway-api flag
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: http
                namespace: agentgateway-system
                kind: Gateway

---
# Example ClusterIssuer for Let's Encrypt Staging (for testing) using Gateway API
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
spec:
  acme:
    # Let's Encrypt staging server (for testing)
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: your-email@example.com
    privateKeySecretRef:
      name: letsencrypt-staging
    # HTTP-01 challenge provider using Gateway API
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: http
                namespace: agentgateway-system
                kind: Gateway

---
# ClusterIssuer for Let's Encrypt using DNS-01 challenge with Route53
# Requires IRSA (IAM Roles for Service Accounts) configured for cert-manager
# Reference: https://cert-manager.io/docs/configuration/acme/dns01/route53/
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: '{{ACME_EMAIL}}'
    privateKeySecretRef:
      name: letsencrypt-dns
    solvers:
      - dns01:
          route53:
            region: '{{AWS_REGION}}'
            # When using IRSA, no explicit credentials needed
            # cert-manager will use the service account's IAM role

---
# ClusterIssuer for self-signed certificates (for development)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
spec:
  selfSigned: {}

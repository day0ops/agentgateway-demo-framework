# cert-manager Helm chart values
# Reference: https://cert-manager.io/docs/configuration/

# Global configuration
global:
  commonLabels: {}
  # Image registry (optional)
  # imageRegistry: ""

  # Image pull secrets (optional)
  # imagePullSecrets: []

# cert-manager controller configuration
replicaCount: 1

# Resource limits
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Webhook configuration
webhook:
  replicaCount: 1

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi

# CA Injector configuration
cainjector:
  replicaCount: 1

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Service account
serviceAccount:
  create: true
  # name: ""

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Prometheus metrics
prometheus:
  enabled: false
  servicemonitor:
    enabled: false

# Startup API check
startupapicheck:
  enabled: true
  timeout: 5m

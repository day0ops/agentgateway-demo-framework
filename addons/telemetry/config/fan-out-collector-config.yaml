# OpenTelemetry Collector configuration for fan-out to multiple backends
# Receives traces from agentgateway and forwards to both:
# - solo-enterprise-telemetry-collector (ClickHouse/Solo UI)
# - tempo-distributor (Grafana Tempo)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  # Forward to Solo UI's telemetry collector (ClickHouse)
  otlp/solo-ui:
    endpoint: solo-enterprise-telemetry-collector.agentgateway-system:4317
    tls:
      insecure: true

  # Forward to Grafana Tempo
  otlp/tempo:
    endpoint: tempo-distributor.telemetry:4317
    tls:
      insecure: true

processors:
  batch:
    send_batch_size: 1000
    timeout: 1s

  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 20

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/solo-ui, otlp/tempo]

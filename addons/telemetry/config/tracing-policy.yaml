apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: tracing
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: telemetry
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway
  frontend:
    tracing:
      backendRef:
        name: tempo-distributor
        namespace: telemetry
        port: 4317
      protocol: GRPC
      clientSampling: "true"
      randomSampling: "true"
      resources:
        - name: deployment.environment.name
          expression: '"demo"'
        - name: service.version
          expression: '"agentgateway-demo"'
      attributes:
        add:
          - name: host
            expression: 'request.host'
          - name: path
            expression: 'request.path'
          - name: http.method
            expression: 'request.method'
          - name: http.scheme
            expression: 'request.scheme'
          - name: http.status_code
            expression: 'default(string(response.code), "0")'
          - name: request
            expression: 'default(request.headers["x-header-tag"], "")'
          - name: source.address
            expression: 'source.address'
          - name: backend.name
            expression: 'default(backend.name, "")'
          - name: backend.type
            expression: 'default(backend.type, "")'
          - name: llm.request_model
            expression: 'default(llm.requestModel, "")'
          - name: llm.response_model
            expression: 'default(llm.responseModel, "")'
          - name: llm.input_tokens
            expression: 'default(string(llm.inputTokens), "0")'
          - name: llm.output_tokens
            expression: 'default(string(llm.outputTokens), "0")'
          - name: mcp.tool.name
            expression: 'default(mcp.tool.name, "")'
          - name: mcp.tool.target
            expression: 'default(mcp.tool.target, "")'

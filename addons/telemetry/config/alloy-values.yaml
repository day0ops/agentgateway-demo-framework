# Helm values for Grafana Alloy (log collection)
# https://github.com/grafana/alloy/tree/main/operations/helm/charts/alloy

alloy:
  configMap:
    content: |
      // Discover pods in the cluster
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Relabel to add useful labels
      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
          target_label  = "component"
        }
        // Only keep pods in agentgateway-system namespace
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          regex         = "agentgateway-system"
          action        = "keep"
        }
      }

      // Collect logs from pods
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.process.parse.receiver]
      }

      // Process logs - parse JSON if applicable
      loki.process "parse" {
        forward_to = [loki.write.loki.receiver]

        // Parse JSON logs
        stage.json {
          expressions = {
            level   = "level",
            message = "msg",
            time    = "time",
          }
        }

        // Add level as a label
        stage.labels {
          values = {
            level = "",
          }
        }
      }

      // Write to Loki
      loki.write "loki" {
        endpoint {
          url = "http://loki.telemetry:3100/loki/api/v1/push"
        }
      }

controller:
  type: daemonset

serviceAccount:
  create: true

apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: agentgateway-control-plane-metrics
  namespace: telemetry
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: telemetry
spec:
  namespaceSelector:
    matchNames:
      - agentgateway-system
  podMetricsEndpoints:
    - port: metrics
  selector:
    matchLabels:
      app.kubernetes.io/name: enterprise-agentgateway

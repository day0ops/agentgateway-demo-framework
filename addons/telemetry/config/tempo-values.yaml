# Helm values for Grafana Tempo Distributed
# https://github.com/grafana/helm-charts/tree/main/charts/tempo-distributed

# Disable minio - use local storage for simplicity
minio:
  enabled: false

# Enable OTLP receivers for traces
traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true
  zipkin:
    enabled: false
  jaeger:
    thriftHttp:
      enabled: false
  opencensus:
    enabled: false

# Minimal resource configuration for local/demo environments
# Single replica setup requires replication_factor=1
# Anti-affinity disabled for single-node/small clusters
ingester:
  replicas: 1
  config:
    replication_factor: 1
  affinity: {}

distributor:
  replicas: 1
  affinity: {}

querier:
  replicas: 1
  affinity: {}

queryFrontend:
  replicas: 1
  affinity: {}

compactor:
  replicas: 1
  affinity: {}

# Enable metrics generator for TraceQL metrics queries (rate(), etc.)
metricsGenerator:
  enabled: true
  replicas: 1
  affinity: {}
  config:
    storage:
      path: /var/tempo/wal
      remote_write: []

# Use local storage
storage:
  trace:
    backend: local

# Helm values for Grafana Tempo Distributed
# https://github.com/grafana/helm-charts/tree/main/charts/tempo-distributed

# Disable minio - use local storage for simplicity
minio:
  enabled: false

# Enable OTLP receivers for traces
traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true
  zipkin:
    enabled: false
  jaeger:
    thriftHttp:
      enabled: false
  opencensus:
    enabled: false

# Minimal resource configuration for local/demo environments
distributor:
  replicas: 1

ingester:
  replicas: 1

querier:
  replicas: 1

queryFrontend:
  replicas: 1

compactor:
  replicas: 1

# Use local storage
storage:
  trace:
    backend: local

# Helm values for OpenTelemetry Collector (Metrics)
# https://github.com/open-telemetry/opentelemetry-helm-charts/tree/main/charts/opentelemetry-collector

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

clusterRole:
  create: true
  rules:
    - apiGroups:
        - ""
      resources:
        - "pods"
        - "nodes"
      verbs:
        - "get"
        - "list"
        - "watch"
ports:
  promexporter:
    enabled: true
    containerPort: 9099
    servicePort: 9099
    protocol: TCP

command:
  name: otelcol-contrib
  extraArgs:
    - "--feature-gates=receiver.prometheusreceiver.EnableNativeHistograms"

config:
  receivers:
    prometheus/kgateway-dataplane:
      config:
        global:
          scrape_protocols:
            [
              PrometheusProto,
              OpenMetricsText1.0.0,
              OpenMetricsText0.0.1,
              PrometheusText0.0.4,
            ]
        scrape_configs:
          # Scrape the kgateway proxy pods
          - job_name: kgateway-gateways
            honor_labels: true
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - action: keep
                regex: kube-gateway
                source_labels:
                  - __meta_kubernetes_pod_label_kgateway
              - source_labels:
                  [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: true
              - source_labels:
                  [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - action: replace
                source_labels:
                  - __meta_kubernetes_pod_ip
                  - __meta_kubernetes_pod_annotation_prometheus_io_port
                separator: ":"
                target_label: __address__
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: kube_namespace
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod
    prometheus/kgateway-controlplane:
      config:
        global:
          scrape_protocols:
            [
              PrometheusProto,
              OpenMetricsText1.0.0,
              OpenMetricsText0.0.1,
              PrometheusText0.0.4,
            ]
        scrape_configs:
          # Scrape the kgateway controlplane pods
          - job_name: kgateway-controlplane
            honor_labels: true
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - action: keep
                regex: kgateway
                source_labels:
                  - __meta_kubernetes_pod_label_kgateway
              - source_labels:
                  [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: true
              - source_labels:
                  [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - action: replace
                source_labels:
                  - __meta_kubernetes_pod_ip
                  - __meta_kubernetes_pod_annotation_prometheus_io_port
                separator: ":"
                target_label: __address__
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: kube_namespace
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod
  exporters:
    prometheus:
      endpoint: 0.0.0.0:9099
    prometheusremotewrite/kube-prometheus-stack:
      endpoint: http://kube-prometheus-stack-prometheus.telemetry.svc:9090/api/v1/write
    debug:
      verbosity: detailed
  service:
    pipelines:
      metrics:
        receivers:
          [prometheus/kgateway-dataplane, prometheus/kgateway-controlplane]
        processors: [batch]
        exporters: [debug, prometheusremotewrite/kube-prometheus-stack]

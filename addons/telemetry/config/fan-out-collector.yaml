# Fan-out OTEL Collector Deployment
# Routes traces to both Solo UI (ClickHouse) and Grafana (Tempo)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fan-out-collector-config
  namespace: telemetry
  labels:
    app.kubernetes.io/name: fan-out-collector
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: telemetry
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      otlp/solo-ui:
        endpoint: solo-enterprise-telemetry-collector.agentgateway-system:4317
        tls:
          insecure: true

      otlp/tempo:
        endpoint: tempo-distributor.telemetry:4317
        tls:
          insecure: true

    processors:
      batch:
        send_batch_size: 1000
        timeout: 1s

      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 20

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/solo-ui, otlp/tempo]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fan-out-collector
  namespace: telemetry
  labels:
    app.kubernetes.io/name: fan-out-collector
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fan-out-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fan-out-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args:
            - --config=/conf/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: fan-out-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: fan-out-collector
  namespace: telemetry
  labels:
    app.kubernetes.io/name: fan-out-collector
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: telemetry
spec:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
  selector:
    app.kubernetes.io/name: fan-out-collector
---
apiVersion: gateway.networking.k8s.io/v1
kind: ReferenceGrant
metadata:
  name: allow-fan-out-collector-access
  namespace: telemetry
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: telemetry
spec:
  from:
    - group: enterpriseagentgateway.solo.io
      kind: EnterpriseAgentgatewayPolicy
      namespace: agentgateway-system
  to:
    - group: ''
      kind: Service
      name: fan-out-collector

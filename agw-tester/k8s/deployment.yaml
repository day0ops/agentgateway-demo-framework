apiVersion: apps/v1
kind: Deployment
metadata:
  name: agw-tester
  labels:
    app: agw-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agw-tester
  template:
    metadata:
      labels:
        app: agw-tester
    spec:
      containers:
        - name: agw-tester
          image: agw-tester:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: '3000'
            - name: AGENTGATEWAY_URL
              value: 'http://agentgateway.default.svc.cluster.local:8080'
            - name: KEYCLOAK_URL
              value: 'http://keycloak.default.svc.cluster.local:9000'
            - name: DEFAULT_REALM
              value: 'agw-dev'
            - name: STS_PORT
              value: '7777'
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '500m'
---
apiVersion: v1
kind: Service
metadata:
  name: agw-tester
spec:
  selector:
    app: agw-tester
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

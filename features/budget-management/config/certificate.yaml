apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: budget-management-tls
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: budget-management
spec:
  secretName: budget-management-tls-secret
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - localhost
    - budget-management.agentgateway-system.svc.cluster.local

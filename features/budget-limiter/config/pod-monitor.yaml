apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: budget-limiter-metrics
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: budget-limiter
spec:
  namespaceSelector:
    matchNames:
      - agentgateway-system
  podMetricsEndpoints:
    - port: metrics
  selector:
    matchLabels:
      app: budget-limiter

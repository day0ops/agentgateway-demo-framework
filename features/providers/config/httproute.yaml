# parentRefs are set at deploy time to match the default Gateway or the gateway feature (when used)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: provider-name
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/provider: provider-name
spec:
  parentRefs:
    - name: agentgateway
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /provider-name
      backendRefs:
        - name: provider-name
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend

apiVersion: v1
kind: ConfigMap
metadata:
  name: quota-management-access-policy
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: quota-budget
data:
  policy.rego: |-
    package quota

    default allow = false

    # Pass through when no JWT present (let OIDC handle the redirect)
    allow {
        not input.state.jwt
    }

    # Allow acme-corp org users
    allow {
        [_, payload, _] = io.jwt.decode(input.state.jwt)
        payload["org_id"] == "acme-corp"
    }

    # Allow team-beta users regardless of org
    allow {
        [_, payload, _] = io.jwt.decode(input.state.jwt)
        payload["team_id"] == "team-beta"
    }

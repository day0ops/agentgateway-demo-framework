apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: quota-management-tls
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: quota-budget
spec:
  secretName: quota-management-tls-secret
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - localhost
    - quota-management.agentgateway-system.svc.cluster.local

## AgentGateway profile with solo-ui

environment: local

helmValues: {}

addons:
  - name: solo-ui
    description: Solo Enterprise UI for agentgateway
    namespace: agentgateway-system
  - name: telemetry
    description: OpenTelemetry observability stack (Prometheus, Grafana, Loki, Tempo)
    namespace: telemetry
    config:
      enableTraces: false

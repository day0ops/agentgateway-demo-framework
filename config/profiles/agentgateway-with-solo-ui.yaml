## AgentGateway profile with solo-ui

helmValues:
  # enabled agentgateway
  agentgateway:
    enabled: true

  # disabled envoy
  envoy:
    enabled: false

addons:
  - name: solo-ui
    description: Solo Enterprise UI for agentgateway
    namespace: agentgateway-system
  - name: telemetry
    description: OpenTelemetry observability stack (Prometheus, Grafana, Loki, Tempo)
    namespace: telemetry
    config:
      enableTraces: false

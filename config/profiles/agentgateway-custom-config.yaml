## AgentGateway with Custom Configuration Profile

helmValues: {}

# Additional Kubernetes resources to create after Helm installation
# Resources are loaded from YAML files in the profile directory
# This allows injecting custom agentgateway configuration via ConfigMap and GatewayParameters
resources:
  - agentgateway-custom-config/configmap.yaml
  - agentgateway-custom-config/gateway-parameters.yaml
  - agentgateway-custom-config/gateway.yaml

addons: []

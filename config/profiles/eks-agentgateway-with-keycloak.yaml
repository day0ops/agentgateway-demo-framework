## AgentGateway profile with Keycloak
## Installs Keycloak as IdP — covers OBO token exchange, workload identity, and other Keycloak-based security demos
## Reference: https://docs.solo.io/agentgateway/latest/security/

environment: aws-dev

agentgateway:
  version: 'v2026.5.0-beta.3'
  # ociRegistry: 'oci://us-central1-docker.pkg.dev/developers-369321/enterprise-agentgateway-public-nonprod/charts'
  ociRegistry: 'oci://us-docker.pkg.dev/solo-public/enterprise-agentgateway/charts'
  # version: v2.3.0-beta.5-8-ge5b1f320b-dirty
  # ociRegistry: oci://australia-southeast1-docker.pkg.dev/field-engineering-apac/public-repo/charts

agentgateway-crds:
  version: 'v2026.5.0-beta.3'
  # ociRegistry: 'oci://us-central1-docker.pkg.dev/developers-369321/enterprise-agentgateway-public-nonprod/charts'
  ociRegistry: 'oci://us-docker.pkg.dev/solo-public/enterprise-agentgateway/charts'
  # version: v2.3.0-beta.5-8-ge5b1f320b-dirty
  # ociRegistry: oci://australia-southeast1-docker.pkg.dev/field-engineering-apac/public-repo/charts

  # enable Gateway API experimental features
gatewayApi:
  version: 'v1.5.1'
  channel: experimental

helmValues:
  controller:
    extraEnv:
      # enable Gateway API experimental features in the controller
      KGW_ENABLE_GATEWAY_API_EXPERIMENTAL_FEATURES: 'true'

  # STS token exchange configuration
  tokenExchange:
    enabled: true
    issuer: 'enterprise-agentgateway.agentgateway-system.svc.cluster.local:7777'
    tokenExpiration: 24h
    subjectValidator:
      validatorType: remote
      remoteConfig:
        url: "https://{{env.domains.keycloak}}/realms/agw-dev/protocol/openid-connect/c\
          erts"
    actorValidator:
      validatorType: k8s
    apiValidator:
      validatorType: remote
      remoteConfig:
        url: "https://{{env.domains.keycloak}}/realms/agw-dev/protocol/openid-connect/c\
          erts"

resources:
  - agentgateway-with-keycloak/enterprise-agentgateway-sharedext-params.yaml
  - agentgateway-with-keycloak/enterprise-agentgateway-gatewayclass.yaml

# feature gates
featureGates:
  ## because we use self-service this injects keycloak CA cert into the ext-auth service's trusted CA bundle
  injectExtAuthCustomCaCert:
    enabled: true
    sourceSecret: keycloak-tls
    sourceNamespace: keycloak

addons:
  ## cert-manager with Let's Encrypt DNS-01 support
  - name: cert-manager
    description: Certificate management for TLS
    namespace: cert-manager
    config:
      letsencrypt:
        enabled: true
        email: '{{env.acme.email}}'
        region: '{{env.aws.region}}'

  ## external-dns (must be before keycloak so DNS records are created)
  - name: external-dns
    description: Automatic DNS record management via Route53
    namespace: external-dns
    config:
      provider: route53
      zoneId: '{{env.dns.parentZone.hostedZoneId}}'
      domainFilter: '{{env.dns.childZone}}.{{env.dns.parentZone.domain}}'
      region: ap-southeast-2

  ## keycloak
  - name: keycloak
    description: Keycloak OIDC Identity Provider
    namespace: keycloak
    config:
      storageClassName: gp3 # (requires EBS CSI driver)
      keycloakNamespace: keycloak
      hostname: '{{env.domains.keycloak}}'
      protocol: https
      tls:
        enabled: true
        secretName: keycloak-tls
        createCertificate: true
      realms:
        - realm: agw-dev
          defaultPassword: Password1!
          clients:
            - clientId: agw-client
              type: confidential
              clientSecret: agw-client-secret
              flows: [authorization-code, service-account]
            - clientId: agw-client-public
              type: public
              flows: [authorization-code]
            - clientId: quota-management
              type: confidential
              clientSecret: quota-management-secret
              flows: [authorization-code, service-account]
          customAttributes: [org_id, team_id, group, is_org]
          users:
            - username: acme-corp-admin
              firstName: Acme Corp
              lastName: Admin
              email: acme-corp-admin@acme-corp.demo
              attributes: { org_id: acme-corp, is_org: 'true', group: admins }
            - username: user1
              firstName: Alpha
              lastName: User
              email: user1@acme-corp.demo
              attributes: { org_id: acme-corp, team_id: team-alpha, group: users, is_org: 'false' }
            - username: user2
              firstName: Beta
              lastName: User Two
              email: user2@acme-corp.demo
              attributes: { org_id: acme-corp, team_id: team-beta, group: users, is_org: 'false' }
            - username: team-alpha-admin
              firstName: Team Alpha
              lastName: Admin
              email: team-alpha-admin@acme-corp.demo
              attributes: { org_id: acme-corp, team_id: team-alpha, group: users, is_org: 'false' }
            - username: team-beta-admin
              firstName: Team Beta
              lastName: Admin
              email: team-beta-admin@acme-corp.demo
              attributes: { org_id: acme-corp, team_id: team-beta, group: users, is_org: 'false' }

        - realm: org-acme
          orgId: acme
          defaultPassword: Password1!
          teams:
            - teamId: team-eng
              clientId: acme-team-eng
              clientSecret: acme-team-eng-secret
              users:
                - username: acme-eng-user1
                  firstName: Acme Eng
                  lastName: User
                  email: acme-eng-user1@org-acme.demo
                  attributes: { org_id: acme, team_id: team-eng }
                - username: acme-eng-admin
                  firstName: Acme Eng
                  lastName: Admin
                  email: acme-eng-admin@org-acme.demo
                  attributes: { org_id: acme, team_id: team-eng, is_org: 'true' }
            - teamId: team-finance
              clientId: acme-team-finance
              clientSecret: acme-team-finance-secret
              users:
                - username: acme-finance-user1
                  firstName: Acme Finance
                  lastName: User
                  email: acme-finance-user1@org-acme.demo
                  attributes: { org_id: acme, team_id: team-finance }

        - realm: org-globex
          orgId: globex
          defaultPassword: Password1!
          teams:
            - teamId: team-ops
              clientId: globex-team-ops
              clientSecret: globex-team-ops-secret
              users:
                - username: globex-ops-user1
                  firstName: Globex Ops
                  lastName: User
                  email: globex-ops-user1@org-globex.demo
                  attributes: { org_id: globex, team_id: team-ops }
            - teamId: team-sales
              clientId: globex-team-sales
              clientSecret: globex-team-sales-secret
              users:
                - username: globex-sales-user1
                  firstName: Globex Sales
                  lastName: User
                  email: globex-sales-user1@org-globex.demo
                  attributes: { org_id: globex, team_id: team-sales }

        - realm: org-initech
          orgId: initech
          defaultPassword: Password1!
          teams:
            - teamId: team-dev
              clientId: initech-team-dev
              clientSecret: initech-team-dev-secret
              users:
                - username: initech-dev-user1
                  firstName: Initech Dev
                  lastName: User
                  email: initech-dev-user1@org-initech.demo
                  attributes: { org_id: initech, team_id: team-dev }
            - teamId: team-qa
              clientId: initech-team-qa
              clientSecret: initech-team-qa-secret
              users:
                - username: initech-qa-user1
                  firstName: Initech QA
                  lastName: User
                  email: initech-qa-user1@org-initech.demo
                  attributes: { org_id: initech, team_id: team-qa }

        - realm: org-umbrella
          orgId: umbrella
          defaultPassword: Password1!
          teams:
            - teamId: team-research
              clientId: umbrella-team-research
              clientSecret: umbrella-team-research-secret
              users:
                - username: umbrella-research-user1
                  firstName: Umbrella Research
                  lastName: User
                  email: umbrella-research-user1@org-umbrella.demo
                  attributes: { org_id: umbrella, team_id: team-research }
            - teamId: team-security
              clientId: umbrella-team-security
              clientSecret: umbrella-team-security-secret
              users:
                - username: umbrella-security-user1
                  firstName: Umbrella Security
                  lastName: User
                  email: umbrella-security-user1@org-umbrella.demo
                  attributes: { org_id: umbrella, team_id: team-security }

      soloUIClients:
        enabled: true
        realm: solo-ui
        hostname: 'https://{{env.domains.soloUI}}'
        backendClientId: solo-ui-backend
        backendClientSecret: solo-ui-backend-secret
        frontendClientId: solo-ui-frontend
      workloadClients:
        - clientId: caller-agent
          clientSecret: caller-agent-secret
          audience: agentgateway
          k8sSecretName: caller-agent-credentials
          k8sSecretNamespace: agentgateway-system
        - clientId: chain-caller-agent
          clientSecret: chain-caller-agent-secret
          audience: agentgateway
          k8sSecretName: chain-caller-agent-credentials
          k8sSecretNamespace: agentgateway-system
        - clientId: chain-stock-agent
          clientSecret: chain-stock-agent-secret
          audience: agentgateway
          k8sSecretName: chain-stock-agent-credentials
          k8sSecretNamespace: agentgateway-system

  ## observability stack
  - name: solo-ui
    description: Solo Enterprise UI for agentgateway
    namespace: agentgateway-system
    config:
      managementChartVersion: '0.3.13'
      storageClassName: gp3
      serviceType: ClusterIP
      hostname: '{{env.domains.soloUI}}'
      tls:
        enabled: true
        secretName: solo-ui-tls
        issuer: '{{env.tls.issuer}}'
      oidc:
        enabled: true
        issuerUrl: 'https://{{env.domains.keycloak}}/realms/solo-ui'
        backendClientId: solo-ui-backend
        backendClientSecret: solo-ui-backend-secret
        frontendClientId: solo-ui-frontend
      # Note: telemetry stack manages the global tracing policy so this is false
      applyGatewayTracingPolicy: false
  - name: telemetry
    description: OpenTelemetry observability stack (Prometheus, Grafana, Loki, Tempo)
    namespace: telemetry
    config:
      gatewayNamespace: agentgateway-system
      retention: '120h' # 5 days
      grafanaServiceType: 'LoadBalancer'
      grafanaHostname: '{{env.domains.grafana}}'

## AgentGateway profile with OBO (On Behalf Of) token exchange
## Installs Keycloak as IdP and enables STS token exchange
## Reference: https://docs.solo.io/agentgateway/2.1.x/security/obo-elicitations/obo/

helmValues:
  agentgateway:
    enabled: true

  envoy:
    enabled: false

  # STS token exchange configuration (Step 2 from the OBO docs)
  tokenExchange:
    enabled: true
    issuer: "enterprise-agentgateway.agentgateway-system.svc.cluster.local:7777"
    tokenExpiration: 24h
    subjectValidator:
      validatorType: remote
      remoteConfig:
        # Populated at runtime by the obo-token-exchange feature after Keycloak is ready.
        # Default assumes Keycloak in the keycloak namespace with realm agw-dev.
        url: "https://keycloak.keycloak.svc.cluster.local/realms/agw-dev/protocol/openid-connect/certs"
    actorValidator:
      validatorType: k8s

resources:
  - agentgateway-with-obo/enterprise-agentgateway-parameters.yaml

featureGates:
  injectCaCert:
    enabled: true
    sourceSecret: keycloak-tls
    sourceNamespace: keycloak

addons:
  - name: cert-manager
    description: Certificate management for TLS (required by Keycloak)
    namespace: cert-manager

  - name: keycloak
    description: Keycloak OIDC Identity Provider for OBO token exchange
    namespace: keycloak
    config:
      keycloakNamespace: keycloak
      hostname: keycloak.keycloak.svc.cluster.local
      protocol: https
      realm: agw-dev
      clientId: agw-client
      clientSecret: agw-client-secret
      publicClientId: agw-client-public
      tls:
        enabled: true
        secretName: keycloak-tls
        createCertificate: true

apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: multi-tier-budgets
  description: |
    Demonstrate multi-tier budget management with org and team level limits.

    This use case shows hierarchical budget enforcement where:
    - Organization has a total budget (e.g., $100/day)
    - Teams have their own budgets (e.g., $20/day for engineering, $30/day for support)
    - Requests are matched to budgets using CEL expressions based on headers

    The budget management uses x-team header to route requests to the appropriate
    team budget. If no team header is provided, the default org budget applies.
  docs: https://docs.solo.io/agentgateway/latest/traffic-management/ext-proc/

spec:
  diagram: |
    flowchart LR
      Client([Client]) --> AG[AgentGateway]
      AG --> BL[Budget Limiter<br/>ext-proc]
      BL <--> DB[(PostgreSQL)]
      AG --> LLM[OpenAI]

      subgraph "Budget Hierarchy"
        ORG[Org Budget<br/>$100/day]
        ENG[Engineering<br/>$20/day]
        SUP[Support<br/>$30/day]
      end

  steps:
    - title: Configure OpenAI provider
      description: |
        Set up OpenAI provider for LLM requests.
      features:
        - name: providers
          config:
            providers:
              - name: openai
                providerName: openai
                pathPrefix: /openai
                model: gpt-4o-mini

    - title: Deploy budget management with org budget
      description: |
        Deploy the budget management service with the default organization budget.
        Team budgets will be created via the API.
      features:
        - name: budget-management
          config:
            budgetAmount: 100.00
            period: daily
            entityType: channel
            entityId: default
            matchExpression: 'true'
            warningThresholdPct: 80
            description: 'Organization default budget'

  tests:
    - name: org-budget-works
      description: Requests without x-team header use org budget
      steps:
        - action: send-request
          endpoint: /openai
          prompt: 'Hello from org'
          timeout: 60000
        - action: verify
          expect:
            status: success

    - name: team-budget-routing
      description: Requests with x-team header are routed to team budget
      setup:
        - action: create-budget
          entityType: usecase
          entityId: engineering
          amount: 20.00
          period: daily
          matchExpression: 'request.headers["x-team"] == "engineering"'
          description: 'Engineering team budget'
        - action: wait
          duration: 35000
      steps:
        - action: send-request
          endpoint: /openai
          prompt: 'Hello from engineering team'
          headers:
            x-team: engineering
          timeout: 60000
        - action: verify
          expect:
            status: success
      teardown:
        - action: delete-budget
          entityType: usecase
          entityId: engineering

    - name: team-budget-limit-enforced
      description: Team requests are blocked when team budget is exhausted
      setup:
        - action: create-budget
          entityType: usecase
          entityId: support
          amount: 5.00
          period: daily
          matchExpression: 'request.headers["x-team"] == "support"'
          description: 'Support team budget'
        - action: set-budget-usage
          entityType: usecase
          entityId: support
          usage: 4.999
        - action: wait
          duration: 35000
      steps:
        - action: send-request
          endpoint: /openai
          prompt: 'Hello from support'
          headers:
            x-team: support
          timeout: 60000
        - action: verify
          expect:
            status: 429
      teardown:
        - action: delete-budget
          entityType: usecase
          entityId: support

apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: request-based-rate-limiting
  description: |
    Global request-based rate limiting using a simple counter. An OpenAI backend is
    configured via the providers feature, then a RateLimitConfig and EnterpriseAgentgatewayPolicy
    are applied to enforce a maximum number of requests per time unit across all users.
    After the configured limit is exceeded, subsequent requests receive a 429 Too Many Requests
    response from the gateway.
  docs: https://docs.solo.io/agentgateway/2.1.x/traffic-management/rate-limiting/

spec:
  steps:
    - title: Add provider
      description: Configure the OpenAI LLM provider backend and route.
      features:
        - name: providers
          config:
            providers:
              - name: openai
                providerName: openai
                pathPrefix: /openai
                model: gpt-4o-mini

    - title: Apply rate limit policy
      description: >
        Create a RateLimitConfig with a global counter (5 requests per minute)
        and attach it to the Gateway via an EnterpriseAgentgatewayPolicy.
      features:
        - name: rate-limit
          config:
            mode: global
            type: REQUEST
            requestsPerUnit: 5
            unit: MINUTE

  tests:
    - name: allow-request-within-limit
      description: Requests within the rate limit window should succeed
      steps:
        - action: send-request
          endpoint: /openai
          prompt: "What is your favorite poem?"
        - action: verify
          expect:
            status: success

    - name: rate-limited-after-threshold
      description: The 6th request within the window should be rate limited (429)
      steps:
        - action: send-request
          endpoint: /openai
          prompt: "Hello"
        - action: send-request
          endpoint: /openai
          prompt: "Hello"
        - action: send-request
          endpoint: /openai
          prompt: "Hello"
        - action: send-request
          endpoint: /openai
          prompt: "Hello"
        - action: send-request
          endpoint: /openai
          prompt: "Hello"
        - action: send-request
          endpoint: /openai
          prompt: "Hello"
        - action: verify
          expect:
            statusCode: 429

apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: global-token-based-rate-limiting
  description: |
    Global input-token-based rate limiting using the Enterprise Rate Limit Server.
    All proxy replicas consult a central rate limit server to share a single token
    counter, ensuring consistent quotas across the entire fleet. A RateLimitConfig
    with type TOKEN counts consumed input tokens rather than raw requests. This is
    ideal for enforcing tenant-wide LLM usage budgets. The prompt "What is your
    favorite poem?" consumes ~5 tokens, so a budget of 10 tokens per hour allows
    roughly two requests before rate limiting kicks in.
  docs: https://docs.solo.io/agentgateway/2.1.x/traffic-management/rate-limiting/

spec:
  diagram: |
    sequenceDiagram
      participant Client
      participant AGW as AgentGateway
      participant RLS as Rate Limit Server
      participant LLM as OpenAI
      Client->>AGW: request
      AGW->>RLS: check shared token counter
      RLS-->>AGW: limit exceeded (10 tokens/hr)
      AGW-->>Client: 429 Too Many Requests
      RLS-->>AGW: within limit, increment counter
      AGW->>LLM: forward request
      LLM-->>Client: response
  steps:
    - title: Add provider
      description: Configure the OpenAI LLM provider backend and route.
      features:
        - name: providers
          config:
            providers:
              - name: openai
                providerName: openai
                pathPrefix: /openai
                model: gpt-4o-mini

    - title: Apply global token rate limit
      description: >
        Create a RateLimitConfig with type TOKEN (10 tokens per hour) and attach
        it to the Gateway via an EnterpriseAgentgatewayPolicy. All replicas share
        a single counter through the central Enterprise Rate Limit Server.
      features:
        - name: rate-limit
          config:
            mode: global
            type: TOKEN
            name: token-based-rate-limit
            requestsPerUnit: 10
            unit: HOUR

  tests:
    - name: first-request-allowed
      description: First request within the global token budget should succeed
      steps:
        - action: send-request
          endpoint: /openai
          prompt: 'What is your favorite poem?'
        - action: verify
          expect:
            status: success

    - name: rate-limited-after-token-budget
      description: Repeated requests exhaust the 10-token budget and should be rate limited
      steps:
        - action: send-request
          endpoint: /openai
          prompt: 'What is your favorite poem?'
        - action: send-request
          endpoint: /openai
          prompt: 'What is your favorite poem?'
        - action: send-request
          endpoint: /openai
          prompt: 'What is your favorite poem?'
        - action: verify
          expect:
            statusCode: 429

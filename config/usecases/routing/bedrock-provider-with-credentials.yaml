apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: bedrock-provider-with-credentials
  description: |
    Route requests to AWS Bedrock (Nova Lite) using AWS credential-based authentication.

    - Provider configured with authMode: credentials (access key + secret key)
    - Credentials stored as a Kubernetes Secret
    - Gateway signs each request using the stored credential pair
    - Exposed at /bedrock behind a single AgentgatewayBackend
  docs: https://kgateway.dev/docs/latest/agentgateway/llm/providers/amazon-bedrock/

spec:
  diagram: |
    flowchart LR
      Client --> AGW[AgentGateway]
      AGW --> Bedrock[AWS Bedrock]

  features:
    - name: providers
      config:
        providers:
          - name: bedrock
            providerName: bedrock
            pathPrefix: /bedrock
            model: global.amazon.nova-2-lite-v1:0
            region: us-east-1
            authMode: credentials

  tests:
    - name: test-bedrock-greeting
      description: Test Bedrock with a greeting
      steps:
        - action: send-request
          endpoint: /bedrock
          prompt: 'Hello, how are you?'
        - action: verify
          expect:
            status: success

    - name: test-bedrock-provider
      description: Test simple Bedrock LLM call
      steps:
        - action: send-request
          endpoint: /bedrock
          prompt: 'What is 2+2?'
        - action: verify
          expect:
            status: success
            contains: '4'

apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: openai-provider
  description: Simple OpenAI LLM provider call
  docs: https://kgateway.dev/docs/latest/agentgateway/llm/providers/

spec:
  features:
    - name: providers
      config:
        providers:
          - name: openai
            providerName: openai
            pathPrefix: /openai
            model: gpt-4o-mini

  tests:
    - name: test-openai-greeting
      description: Test OpenAI with a greeting
      steps:
        - action: send-request
          endpoint: /openai
          prompt: "Hello, how are you?"
        - action: verify
          expect:
            status: success

    - name: test-openai-provider
      description: Test simple OpenAI LLM call
      steps:
        - action: send-request
          endpoint: /openai
          prompt: "What is 2+2?"
        - action: verify
          expect:
            status: success
            contains: "4"

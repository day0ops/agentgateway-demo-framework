apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: openai-provider
  description: |
    The minimal baseline: a single OpenAI (gpt-4o-mini) provider behind agentgateway.

    - providers feature with default settings at /openai
    - No extra policies, auth, or routing logic applied
    - Verifies end-to-end LLM request routing is functional
  docs: https://kgateway.dev/docs/latest/agentgateway/llm/providers/

spec:
  diagram: |
    flowchart LR
      Client --> AGW[AgentGateway]
      AGW --> OpenAI[OpenAI]

  features:
    - name: providers
      config:
        providers:
          - name: openai
            providerName: openai
            pathPrefix: /openai
            model: gpt-4o-mini

  tests:
    - name: test-openai-greeting
      description: Test OpenAI with a greeting
      steps:
        - action: send-request
          endpoint: /openai
          prompt: 'Hello, how are you?'
        - action: verify
          expect:
            status: success

    - name: test-openai-provider
      description: Test simple OpenAI LLM call
      steps:
        - action: send-request
          endpoint: /openai
          prompt: 'What is 2+2?'
        - action: verify
          expect:
            status: success
            contains: '4'

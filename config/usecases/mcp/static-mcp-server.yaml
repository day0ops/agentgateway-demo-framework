apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: static-mcp-server
  description: Route to a static MCP server through agentgateway using the MCP stock server
  docs: https://docs.solo.io/agentgateway/2.1.x/mcp/static-mcp/

spec:
  steps:
    - title: Deploy LLM provider and static MCP server
      description: >
        Deploy an OpenAI LLM provider and the MCP stock server workload.
        Create an AgentgatewayBackend with a static MCP target.
        The Service uses appProtocol kgateway.dev/mcp so agentgateway
        speaks the MCP protocol to the upstream.
      features:
        # - name: providers
        #   config:
        #     providers:
        #       - name: openai
        #         providerName: openai
        #         pathPrefix: /openai
        #         model: gpt-4o-mini
        - name: mcp-server
          config:
            deployServer: true
            image: mcp-stock-server:latest
            serverName: mcp-stock-server
            serverPort: 8000
            servicePort: 80
            protocol: StreamableHTTP
            backendName: mcp-backend
            targetName: mcp-target
            routeName: mcp

  tests:
    - name: test-mcp-tools-list
      description: Verify the MCP server tools are discoverable through agentgateway
      steps:
        - action: send-mcp-request
          endpoint: /mcp
          method: tools/list
        - action: verify
          expect:
            status: success
            contains: get_stock_price

    - name: test-mcp-tool-call
      description: Call the get_stock_price tool through agentgateway
      steps:
        - action: send-mcp-request
          endpoint: /mcp
          method: tools/call
          params:
            name: get_stock_price
            arguments:
              symbol: AAPL
        - action: verify
          expect:
            status: success

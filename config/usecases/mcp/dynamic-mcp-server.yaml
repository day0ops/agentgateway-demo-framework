apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: dynamic-mcp-server
  description: Route to an MCP server dynamically using label selectors instead of static host/port
  docs: https://docs.solo.io/agentgateway/2.1.x/mcp/dynamic-mcp/

spec:
  steps:
    - title: Deploy LLM provider and MCP server with dynamic backend
      description: >
        Deploy an OpenAI LLM provider and the MCP stock server workload.
        Create an AgentgatewayBackend that uses a Kubernetes label selector to
        discover the MCP service dynamically. Unlike a static backend, the
        backing MCP server can be updated without changing the Backend resource.
        The Service uses appProtocol kgateway.dev/mcp so agentgateway speaks
        the MCP protocol to the upstream.
        Note: only Streamable HTTP is supported for label selectors.
      features:
        - name: providers
          config:
            providers:
              - name: openai
                providerName: openai
                pathPrefix: /openai
                model: gpt-4o-mini

        - name: mcp-server
          config:
            deployServer: true
            image: mcp-stock-server:latest
            serverName: mcp-stock-server
            serverPort: 8000
            servicePort: 80
            protocol: StreamableHTTP
            mcpPath: /mcp
            backendName: mcp-backend
            targetName: mcp-stock-server
            matchLabels:
              app: mcp-stock-server
            routeName: mcp

  tests:
    - name: test-mcp-tools-list
      description: Verify the MCP server tools are discoverable through agentgateway via dynamic backend
      steps:
        - action: send-mcp-request
          endpoint: /mcp
          method: tools/list
        - action: verify
          expect:
            status: success
            contains: get_stock_price

    - name: test-mcp-tool-call
      description: Call the get_stock_price tool through agentgateway via dynamic backend
      steps:
        - action: send-mcp-request
          endpoint: /mcp
          method: tools/call
          params:
            name: get_stock_price
            arguments:
              symbol: AAPL
        - action: verify
          expect:
            status: success

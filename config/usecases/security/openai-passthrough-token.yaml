apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: openai-passthrough-token
  description: |
    Pass the client's Bearer API key through to OpenAI without gateway-managed rotation.

    - Provider configured with authMode: passthrough
    - Client supplies its own OpenAI API key in the Authorization header
    - Gateway forwards the header as-is; requests without a token return an error
  docs: https://docs.solo.io/agentgateway/2.1.x/llm/api-keys/#passthrough

spec:
  diagram: |
    flowchart LR
      Client -->|Bearer API-key| AGW[AgentGateway]
      AGW -->|passthrough token| OpenAI[OpenAI]

  features:
    - name: providers
      config:
        providers:
          - name: openai
            providerName: openai
            pathPrefix: /openai
            model: gpt-4o-mini
            authMode: passthrough

  tests:
    - name: test-passthrough-with-valid-token
      description: Request succeeds when the client supplies a valid Bearer token
      steps:
        - action: send-request
          endpoint: /openai
          headers:
            Authorization: 'Bearer ${OPENAI_API_KEY}'
          prompt: 'What is 2+2?'
        - action: verify
          expect:
            status: success
            contains: '4'

    - name: test-passthrough-without-token
      description: Request fails when no Authorization header is provided
      steps:
        - action: send-request
          endpoint: /openai
          prompt: 'Hello'
        - action: verify
          expect:
            status: error

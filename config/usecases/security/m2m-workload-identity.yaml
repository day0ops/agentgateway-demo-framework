apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: m2m-workload-identity
  description: M2M delegation with an ADK agent — user JWT flows through the AGW STS into protected MCP tools
  docs: https://docs.solo.io/agentgateway/2.1.x/security/obo-elicitations/obo/

spec:
  steps:
    - title: Deploy MCP stock server
      description: >
        Deploy the MCP stock server and expose it through agentgateway at /mcp.
        This is the protected backend the ADK agent will call. The route is
        unauthenticated at this stage — the JWT policy is applied in step 3.
      features:
        - name: mcp-server
          config:
            deployServer: true
            image: mcp-stock-server:latest
            serverName: mcp-stock-server
            serverPort: 8000
            servicePort: 80
            protocol: StreamableHTTP
            env:
              MCP_TRANSPORT: streamable-http
            mcpPath: /mcp
            backendName: mcp-backend
            routeName: mcp

    - title: Enable STS token exchange
      description: >
        Enable the AGW Security Token Service (STS) configured to validate
        Keycloak JWTs as the subject (via HTTP JWKS, reachable from the
        distroless controller pod without TLS config). The STS issues short-lived
        delegated JWTs signed by its own keys. The backend JWT policy validates
        exclusively against the STS JWKS — Keycloak is invisible to the MCP server.
      features:
        - name: token-exchange
          config:
            tokenExpiration: 1h
            subjectValidator:
              validatorType: remote
              remoteConfig:
                url: http://keycloak.keycloak.svc.cluster.local:8080/realms/agw-dev/protocol/openid-connect/certs

    - title: Apply JWT auth policy on MCP route
      description: >
        Apply an EnterpriseAgentgatewayPolicy with JWT authentication on the
        /mcp HTTPRoute. Only requests bearing a valid STS-issued JWT are
        admitted; all other requests receive 401. The gateway fetches signing
        keys from the STS JWKS endpoint at port 7777.
      features:
        - name: obo-token-exchange
          config:
            policyName: m2m-mcp-jwt-policy
            issuer: enterprise-agentgateway.agentgateway-system.svc.cluster.local:7777
            jwksPath: .well-known/jwks.json
            jwksBackend:
              name: enterprise-agentgateway
              namespace: agentgateway-system
              port: 7777
            jwtMode: Strict
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: mcp

    - title: Deploy M2M ADK agent
      description: >
        Deploy the M2M ADK agent (from extras/m2m-agent/) as a long-running
        Deployment exposed through the gateway at /agent. The agent uses the
        M2MPlugin to exchange the caller's incoming JWT with the STS
        (impersonation mode: no actor token required) and injects the resulting
        STS token into every outbound MCP tool call via MCPToolset.header_provider.
        The agent holds no long-lived credentials — it delegates the caller's
        authorization context to the protected MCP server.
      features:
        - name: m2m-agent
          config:
            model: gemini-2.0-flash
            mcpUrl: http://agentgateway.agentgateway-system.svc.cluster.local:8080/mcp
            pathPrefix: /agent
            routeName: m2m-agent

  tests:
    - name: test-unauthenticated-mcp-blocked
      description: Direct MCP call without a token is rejected with 401
      steps:
        - action: send-mcp-request
          endpoint: /mcp
          method: tools/list
        - action: verify
          expect:
            status: error

    - name: test-agent-calls-mcp-with-delegation
      description: >
        The caller obtains a Keycloak JWT and passes it to the ADK agent.
        The agent exchanges it with the STS and uses the resulting token to
        call the protected MCP stock server — the caller never touches the
        MCP route directly.
      steps:
        - action: get-token
          keycloak:
            realm: agw-dev
            clientId: agw-client
            clientSecret: agw-client-secret
            grantType: client_credentials
            hostname: keycloak.keycloak.svc.cluster.local:8080
            scheme: http
        - action: call-agent
          endpoint: /agent
          auth: bearer
          query: "What is the current stock price of AAPL?"
          timeout: 60
        - action: verify
          expect:
            status: success
            contains: AAPL

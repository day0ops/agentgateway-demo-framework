apiVersion: agentgateway.demo/v1
kind: UseCase
metadata:
  name: oauth-authorization-code
  description: |
    Full OAuth 2.0 authorization code flow with Keycloak for browser-facing routes.

    - Unauthenticated requests are redirected (302) to Keycloak for login
    - After consent the gateway exchanges the auth code for tokens and issues a session cookie
    - Subsequent requests present the cookie to access the protected LLM route
  docs: https://docs.solo.io/agentgateway/2.1.x/security/extauth/oauth/authorization-code/

spec:
  diagram: |
    sequenceDiagram
      participant Client
      participant AGW as AgentGateway
      participant KC as Keycloak
      participant LLM as OpenAI
      Client->>AGW: GET /openai (no session)
      AGW-->>Client: 302 redirect to Keycloak
      Client->>KC: login with credentials
      KC-->>Client: auth code callback
      Client->>AGW: GET /callback?code=
      AGW->>KC: exchange code for tokens
      KC-->>AGW: access + id tokens
      AGW-->>Client: session cookie
      Client->>AGW: GET /openai + Cookie
      AGW->>LLM: forward request
      LLM-->>Client: LLM response
  steps:
    - title: Deploy OpenAI provider
      description: >
        Deploy the OpenAI LLM provider with a route at /openai so there is a
        backend to protect with authorization code OAuth.
      features:
        - name: providers
          config:
            providers:
              - name: openai
                providerName: openai
                pathPrefix: /openai
                model: gpt-3.5-turbo

    - title: Apply OAuth authorization code policy
      description: >
        Create an AuthConfig with OIDC authorization code settings and an
        EnterpriseAgentgatewayPolicy that enforces external auth on the
        Gateway. Unauthenticated requests receive a 302 redirect to Keycloak.
      features:
        - name: oauth-authorization-code
          config:
            authConfigName: oauth-authorization-code
            policyName: oauth-authorization-code
            keycloak:
              realm: agw-dev
            appUrl: http://192.168.105.201:8080
            issuerUrl: https://keycloak.keycloak.svc.cluster.local/realms/agw-dev/
            clientId: agw-client
            clientSecret: agw-client-secret
            callbackPath: /openai
            scopes:
              - email
            session:
              cookieName: keycloak-session
              redisHost: ext-cache-enterprise-agentgateway:6379
            headers:
              idTokenHeader: jwt

  tests:
    - name: test-unauthenticated-redirects-to-keycloak
      description: Verify unauthenticated requests receive a 302 redirect to Keycloak
      steps:
        - action: send-request
          endpoint: /openai
          prompt: 'What is 2+2?'
          followRedirects: false
        - action: verify
          expect:
            status: 302

    - name: test-authenticated-request-with-session
      description: >
        Validates that a request with a valid session cookie is
        authorized through the OAuth authorization code flow.
      steps:
        - action: get-session-cookie
          endpoint: /openai
          cookieName: keycloak-session
        - action: send-request
          endpoint: /openai
          auth: cookie
          prompt: 'What is 2+2?'
        - action: verify
          expect:
            status: success
            contains: '4'

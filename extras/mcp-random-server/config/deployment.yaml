apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-random-server
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: mcp-random-server
    app: mcp-random-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-random-server
  template:
    metadata:
      labels:
        app: mcp-random-server
    spec:
      serviceAccountName: mcp-random-server
      containers:
        - name: server
          image: mcp-random-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30

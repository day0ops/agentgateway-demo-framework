---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: quota-management
  namespace: agentgateway-system
  labels:
    app: quota-management
    app.kubernetes.io/managed-by: agentgateway-demo
---
apiVersion: v1
kind: Service
metadata:
  name: quota-management
  namespace: agentgateway-system
  labels:
    app: quota-management
    app.kubernetes.io/managed-by: agentgateway-demo
spec:
  type: ClusterIP
  ports:
    - port: 4444
      targetPort: 4444
      protocol: TCP
      name: grpc
      appProtocol: kubernetes.io/h2c
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    app: quota-management
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-management
  namespace: agentgateway-system
  labels:
    app: quota-management
    app.kubernetes.io/managed-by: agentgateway-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quota-management
  template:
    metadata:
      labels:
        app: quota-management
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9090'
        prometheus.io/path: '/metrics'
    spec:
      serviceAccountName: quota-management
      containers:
        - name: quota-management
          image: quota-management:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4444
              name: grpc
              protocol: TCP
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          env:
            - name: GRPC_PORT
              value: '4444'
            - name: HTTP_PORT
              value: '8080'
            - name: METRICS_PORT
              value: '9090'
            - name: DATABASE_URL
              value: 'postgres://budget:budget@quota-management-postgres:5432/budget_management?sslmode=disable'
            - name: LOG_LEVEL
              value: 'info'
            - name: LOG_FORMAT
              value: 'json'
            - name: MODEL_COST_CACHE_TTL
              value: '60s'
            - name: BUDGET_CACHE_TTL
              value: '10s'
            - name: RESERVATION_TTL
              value: '5m'
            - name: DEFAULT_ESTIMATION_MULTIPLIER
              value: '1.0'
            - name: DEFAULT_ESTIMATED_INPUT_TOKENS
              value: '100'
            - name: DEFAULT_ESTIMATED_OUTPUT_TOKENS
              value: '100'
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '500m'
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
